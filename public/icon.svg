<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient: Bright mint green to royal blue -->
    <linearGradient id="bgGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#02c59b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0091eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0040e6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded squircle (same corner radius to feel like a high-end application icon) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Main Monogram "C" & "A" Left Leg -->
  <path d="M 250,195 C 145,195 130,317 235,317 C 275,317 295,290 315,190 L 345,290" 
        fill="none" 
        stroke="white" 
        stroke-width="42" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Monogram "A" right leg swoop pointing up-right -->
  <path d="M 260,305 C 315,315 365,260 410,165" 
        fill="none" 
        stroke="white" 
        stroke-width="42" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Arrowhead at the end of the swoop -->
  <polygon points="360,185 423,153 397,222 380,189" fill="white" />

  <!-- Dynamic White Soccer Ball at bottom-right of the logo -->
  <g transform="translate(390, 320) scale(1.1)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="white" stroke-width="6" />
    <!-- Center pentagon -->
    <polygon points="0,-10 9.5,-3.1 5.9,8.1 -5.9,8.1 -9.5,-3.1" fill="white" />
    <!-- Radiating lines -->
    <line x1="0" y1="-10" x2="0" y2="-30" stroke="white" stroke-width="5" />
    <line x1="9.5" y1="-3.1" x2="28.5" y2="-9.3" stroke="white" stroke-width="5" />
    <line x1="5.9" y1="8.1" x2="17.7" y2="24.3" stroke="white" stroke-width="5" />
    <line x1="-5.9" y1="8.1" x2="-17.7" y2="24.3" stroke="white" stroke-width="5" />
    <line x1="-9.5" y1="-3.1" x2="-28.5" y2="-9.3" stroke="white" stroke-width="5" />
    <!-- Companion hexagon boundary segments -->
    <line x1="0" y1="-30" x2="18.5" y2="-23.5" stroke="white" stroke-width="5" />
    <line x1="28.5" y1="-9.3" x2="18.5" y2="-23.5" stroke="white" stroke-width="5" />
    <line x1="28.5" y1="-9.3" x2="28.5" y2="9.3" stroke="white" stroke-width="5" />
    <line x1="17.7" y1="24.3" x2="28.5" y2="9.3" stroke="white" stroke-width="5" />
    <line x1="17.7" y1="24.3" x2="0" y2="30" stroke="white" stroke-width="5" />
    <line x1="-17.7" y1="24.3" x2="0" y2="30" stroke="white" stroke-width="5" />
    <line x1="-17.7" y1="24.3" x2="-28.5" y2="9.3" stroke="white" stroke-width="5" />
    <line x1="-28.5" y1="-9.3" x2="-18.5" y2="-23.5" stroke="white" stroke-width="5" />
    <line x1="0" y1="-30" x2="-18.5" y2="-23.5" stroke="white" stroke-width="5" />
    <line x1="-28.5" y1="-9.3" x2="-28.5" y2="9.3" stroke="white" stroke-width="5" />
  </g>
</svg>
